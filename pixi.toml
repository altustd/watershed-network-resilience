[workspace]
name = "watershed-network-resilience"
version = "0.1.0"
description = "Hidden Maps Ep. 5 — James River watershed as a directed network"
channels = ["conda-forge"]
platforms = ["osx-arm64", "win-64"]

[dependencies]
python = "3.12.*"
pandas = ">=2.0"
numpy = ">=1.26"
plotly = ">=5.18"
geopandas = ">=0.14"
shapely = ">=2.0"
networkx = ">=3.2"
requests = ">=2.31"
pyarrow = ">=15.0"
pynhd = ">=0.17"
scipy = ">=1.12"
jupyter = ">=1.0"
ipykernel = ">=6.29"

[tasks]
render     = "quarto render watershed-network-resilience.qmd"
render-pdf = "quarto render watershed-network-resilience.qmd --to pdf"
preview    = "quarto preview watershed-network-resilience.qmd"
pull       = "python scripts/01_pull_watershed.py"
kernel     = "python -m ipykernel install --user --name watershed-network-resilience --display-name 'Watershed Network'"
